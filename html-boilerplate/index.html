<!DOCTYPE html> 
<!--PURPOSE: to tell the browser what e=version of HTML-->

<!--ROOT OF THE ELEMENT - every other element will be a descendant of it-->
<html lang="en">
	<!-- "lang" above is an attribute -->
	<!-- Attributes provide additional info -->
	<head>
		<!--the 'head' element is where we put: 
		important meta-info and stuff required to render the webpage-->
		<meta charset="UTF-8">
		<title>My First Message</title>
	</head>
	<body>Hello World!</body>
</html>
